body:
  text: 天台四教集解卷上并序余治平四年冬於郡西之妙果而寄講焉明年夏諸新學請事文墨消釋高麗觀師所錄天台四教于時權以霅川之科分節文之起盡散集諸部法言解釋義之綱要未逾二旬乃成三卷題目謂之四教集解焉艸創纔畢尚未琢磨便為學者傳寫流布世人咸將何晏集解致難而不曾以杜預集解為妨且儒之集解既存二說今之題目何必怪哉嗚呼管闚之局也而有斯惑焉今熈寧九年居大雲西院講訓之餘於是考覈霅川之科未為盡善矣遂乃自出科文一貼仍又檢校疇昔集解頗有疎略也故重修飾亦為三卷所患識見荒蕪辭理鄙昧未能發明聖賢宦奧聊且備于初學分其句逗而已遐方近處見茲再定之文不須復留未治之本也
